name: Scheduled Scrape

on:
  schedule:
    - cron: "0 0 */3 * *"
  workflow_dispatch:

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SCRAPE_SECRET: ${{ secrets.SCRAPE_SECRET }}
      DEVFOLIO_SEARCH_URL: ${{ secrets.DEVFOLIO_SEARCH_URL }}
      SCRAPER_DEVFOLIO_ENABLED: ${{ secrets.SCRAPER_DEVFOLIO_ENABLED }}
      SCRAPER_DEVFOLIO_PLAYWRIGHT: ${{ secrets.SCRAPER_DEVFOLIO_PLAYWRIGHT }}
      SCRAPER_UNSTOP_ENABLED: ${{ secrets.SCRAPER_UNSTOP_ENABLED }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run scraper
        run: node scripts/testScrapers.mjs

      - name: Upload scrape outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-outputs
          path: scripts/scrape_outputs/
